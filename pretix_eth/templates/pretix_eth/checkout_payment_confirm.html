{% load i18n %}

<style>
  /* Anchor the entire Pretix panel-body that hosts our content. Doing it
     here (instead of relying on `.wc-root`'s own min-height) means the
     surrounding page is stable even during React unmount/remount frames,
     boot → React handoff, disconnect transitions, etc. Scoped via
     :has(#wc-payment-root) so it only affects the panel containing our
     content, not every Pretix panel-body on the page. Modern browsers
     only (Chrome 105+, Safari 15.4+, Firefox 121+); on older browsers it
     just doesn't apply and `.wc-root`'s own min-height takes over. */
  .panel-body:has(#wc-payment-root) {
    min-height: 280px;
  }
  /* On mobile, drop the panel-body horizontal padding so the React app
     gets the full viewport width minus its own .wc-root padding. Saves
     ~30 px of width per row — meaningful on narrow phones where the
     status card info rows were getting squeezed. Mirrors the rule in
     styles.css; lives here too so it applies on first paint instead of
     waiting for the external stylesheet to load. */
  @media (max-width: 480px) {
    .panel-body:has(#wc-payment-root) {
      padding-left: 0;
      padding-right: 0;
    }
  }
  /* Mirrors .wc-root (styles.css): same max-width, padding, font, centered
     in the parent column. Paints from inline CSS so it works before
     styles.css loads. min-height matches .wc-root so the boot → React swap
     doesn't reflow the surrounding Pretix page. */
  #wc-boot-loading {
    font-family: system-ui, -apple-system, sans-serif;
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
    color: #111;
    min-height: 240px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    animation: wc-boot-fade-in 0.25s ease-out;
  }
  #wc-boot-loading h3 {
    margin: 0;
    font-size: 17px;
    font-weight: 600;
    text-align: center;
    color: #111;
  }
  #wc-boot-loading p {
    margin: 0;
    font-size: 13px;
    color: #666;
    text-align: center;
  }
  /* Single clean classic ring spinner — same exact visual + animation
     used by the React-side .wc-spinner / .wc-status-card pending state,
     so the boot → React handoff is one continuous loading vocabulary.
     Color picks up Pretix's brand variables when available (`--pretix-
     brand-primary` and its lighten-40 variant) so the spinner is
     theme-aware out of the box; falls back to a sensible blue if the
     Pretix theme stylesheet hasn't loaded yet. */
  #wc-boot-loading .wc-boot-spinner {
    width: 44px;
    height: 44px;
    border: 3px solid var(--pretix-brand-primary-lighten-40, rgba(0, 102, 204, 0.15));
    border-top-color: var(--pretix-brand-primary, #0066cc);
    border-radius: 50%;
    animation: wc-boot-spin 0.7s linear infinite;
  }
  @keyframes wc-boot-spin {
    to { transform: rotate(360deg); }
  }
  @keyframes wc-boot-fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>

<div id="wc-boot-loading" aria-busy="true" aria-live="polite">
  <h3>{% if eth_mainnet_only %}{% trans "Pay with ETH" %}{% else %}{% trans "Pay with crypto" %}{% endif %}</h3>
  <div class="wc-boot-spinner" aria-hidden="true"></div>
  <p>{% trans "Loading wallet…" %}</p>
</div>
<div id="wc-payment-root"></div>

<script id="wc-config" type="application/json">
{
  "wcProjectId": "{{ wc_project_id|escapejs }}",
  "orderCode": "{{ order_code|escapejs }}",
  "orderSecret": "{{ order_secret|escapejs }}",
  "orderTotalUsd": "{{ order_total_usd|escapejs }}",
  "buyerEmail": "{{ buyer_email|escapejs }}",
  "urlPrefix": "{{ url_prefix|escapejs }}",
  "organizer": "{{ organizer_slug|escapejs }}",
  "event": "{{ event_slug|escapejs }}",
  "pretixOrderUrl": "{{ pretix_order_url|escapejs }}",
  "csrfToken": "{{ csrf_token|escapejs }}",
  "supportEmail": "{{ support_email|escapejs }}",
  "frontendOrderUrlTemplate": "{{ frontend_order_url_template|escapejs }}",
  "ethMainnetOnly": {{ eth_mainnet_only|yesno:"true,false" }},
  "safePaymentsEnabled": {{ safe_payments_enabled|yesno:"true,false" }},
  "pluginVersion": "{{ plugin_version|escapejs }}"
}
</script>

<link rel="stylesheet" href="/static/wc_inject/dist/styles.css?v={{ plugin_version|urlencode }}">
<link rel="modulepreload" href="/static/wc_inject/dist/bundle.js?v={{ plugin_version|urlencode }}">
<script type="module" src="/static/wc_inject/dist/bundle.js?v={{ plugin_version|urlencode }}"></script>
