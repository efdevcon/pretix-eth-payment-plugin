{% load i18n %}
<dl class="dl-horizontal">
  {% if chain_name or chain_id %}
    <dt>{% trans "Chain" %}</dt>
    <dd>{{ chain_name|default:"" }}{% if chain_id %} ({{ chain_id }}){% endif %}</dd>
  {% endif %}

  {% if tx_hash %}
    <dt>{% trans "Refund transaction" %}</dt>
    <dd>
      {% if explorer_url %}
        <a href="{{ explorer_url }}" target="_blank" rel="noopener">{{ tx_hash }}</a>
      {% else %}
        <code>{{ tx_hash }}</code>
      {% endif %}
    </dd>
  {% endif %}
</dl>
