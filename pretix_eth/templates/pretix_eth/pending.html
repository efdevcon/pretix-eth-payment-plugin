{% load i18n %}
<div class="wc-pending">
  {% if tx_hash %}
    <p>{% trans "Your payment is being verified on-chain." %}</p>
    <p>
      <strong>{% trans "Transaction:" %}</strong>
      <a href="{{ explorer_url }}" target="_blank" rel="noopener">{{ tx_hash }}</a>
    </p>
  {% else %}
    <p>{% trans "Waiting for payment to be sent." %}</p>
  {% endif %}
</div>
