[flake8]
# E241 ("multiple spaces after ':'") — chains.py uses deliberate alignment
# in its `(chain, symbol) -> {address, decimals}` dict literal for legibility.
# Other repo-wide rules: N802 (function naming, conflicts with web3 ABI),
# W503 (line break before binary operator, conflicts with current PEP 8),
# E402 (module-level imports not at top, used by view files for
# circular-import avoidance).
# Style-only checks we don't gate CI on (blank-line spacing variants, lambda
# assignment, trailing-newline). F401 (unused imports) and F841 (unused
# locals) stay on — those flag real bugs.
ignore = N802,W503,E402,E241,E301,E302,E303,E305,E306,E731,W391
max-line-length = 160
exclude = migrations,.ropeproject,static,_static,build

[isort]
combine_as_imports = true
default_section = THIRDPARTY
include_trailing_comma = true
known_third_party = pretix
known_standard_library = typing
multi_line_output = 5
not_skip = __init__.py
skip = setup.py
